name: CI Pipeline
on:
  push:
    branches: [ "main" ]
    paths:
      - 'Homeworks/06 Настройка CI/**'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: 'Homeworks/06 Настройка CI/'

      - name: Run tests in Docker
        run: |
          cd "Homeworks/06 Настройка CI/src"
          docker build --target test -t test-runner .

      - name: Docker registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: "./Homeworks/06 Настройка CI/src"
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/promo-code-factory-app:latest
